name: CodeQL

on:
  push:
  pull_request:

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    strategy:
      fail-fast: false

      matrix:
        language: [cpp]

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
